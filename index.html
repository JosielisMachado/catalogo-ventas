<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Productos</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .galeria { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-top: 20px; }
        .producto { border: 1px solid #ddd; padding: 10px; border-radius: 8px; }
        img { max-width: 250px; height: auto; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Nuestros Productos Disponibles</h1>
    <div class="galeria" id="contenedor-galeria"></div>

    <script>
        // Fetch lee el archivo JSON que vamos a generar y crea las imágenes dinámicamente
        fetch('productos.json')
            .then(response => response.json())
            .then(fotos => {
                const contenedor = document.getElementById('contenedor-galeria');
                fotos.forEach(foto => {
                    const div = document.createElement('div');
                    div.className = 'producto';
                    div.innerHTML = `<img src="fotos/${foto}" alt="Producto">`;
                    contenedor.appendChild(div);
                });
            })
            .catch(error => console.error('Error cargando el catálogo:', error));
    </script>
</body>
</html>
